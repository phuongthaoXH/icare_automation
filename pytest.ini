[pytest]
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke:       Smoke test – chạy nhanh cover luồng chính
    regression:  Regression test đầy đủ
    giao_dien:   Kiểm thử giao diện UI
    chuc_nang:   Kiểm thử chức năng chính
    validate:    Kiểm thử validate fields
    validate_dropdown: Kiểm thử logic các dropdown phụ thuộc
    exploratory: Exploratory / edge case
    slow:        Test chạy lâu (> 30s)

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S